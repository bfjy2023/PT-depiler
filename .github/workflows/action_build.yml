name: Build Action Release

on:
  push:
    branches: ["master"]
    tags:
      - 'v*'  # 推送 v开头标签 自动发布
  pull_request:
    branches: ["master"]
  workflow_call:
    outputs:
      version:
        value: ${{ jobs.build.outputs.version }}
  workflow_dispatch: # 允许手动执行

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.zip_chrome.outputs.extensionVersion }}

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: ${{ github.event_name == 'pull_request' && '1' || '0' }}

      - uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: ">=23.7.0"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: vue-tsc check
        run: pnpm check
        continue-on-error: ${{ github.event_name == 'pull_request' && false || true }}

      - name: Build Output
        run: |
          pnpm build:dist
          pnpm build:dist-firefox

      - name: Upload Chrome Built to action
        uses: actions/upload-artifact@v4
        with:
          name: build-dist-chrome
          path: dist-chrome

      - name: Upload Firefox Built to action
        uses: actions/upload-artifact@v4
        with:
          name: build-dist-firefox
          path: dist-firefox

      - run: mkdir -p build

      - id: zip_chrome
        name: Build Zip For Chrome
        uses: cardinalby/webext-buildtools-pack-extension-dir-action@v1
        with:
          extensionDir: "dist-chrome"
          zipFilePath: "build/extension-chrome.zip"

      - id: zip_firefox
        name: Build Zip For Firefox
        uses: cardinalby/webext-buildtools-pack-extension-dir-action@v1
        with:
          extensionDir: "dist-firefox"
          zipFilePath: "build/extension-firefox.zip"

      - name: Upload Built Zip to action
        uses: actions/upload-artifact@v4
        with:
          name: build-zip-${{ steps.zip_chrome.outputs.extensionVersion }}
          path: build/*.zip

      - name: Upload build folder to Telegram Channel
        env:
          BUILD_VERSION: ${{ steps.zip_chrome.outputs.extensionVersion }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' && env.TELEGRAM_BOT_TOKEN != '' && env.TELEGRAM_CHAT_ID != '' }}
        run: pnpm action:upload_telegram
        continue-on-error: true

  # ========== 发布到 GitHub Release ==========
  release:
    needs: build # 等待构建完成
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # 只有推送 tag 或手动触发时才发布，PR/普通push不发布
    if: ${{ startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch' }}
    steps:
      - name: Download build zip artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-zip-${{ needs.build.outputs.version }}
          path: build

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v1
        with:
          # 把两个zip上传到Release
          files: |
            build/*.zip
          # 自动设置Release名称：tag模式用tag名，手动触发用扩展版本号
          name: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || format('v{0}', needs.build.outputs.version) }}
          # 默认创建草稿，你检查后手动发布，改成 false 直接公开
          draft: true
          prerelease: false
        env:
          # GitHub自动提供token，不需要额外配置
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
